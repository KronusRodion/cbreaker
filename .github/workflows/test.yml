name: Pipe

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'  # Use same version as local
    
    - name: Download dependencies
      run: go mod download
    
    - name: Install golangci-lint
      run: |
        # Install specific version matching local
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
    
    - name: Run linter
      run: golangci-lint run --out-format=colored-line-number --timeout=5m ./...

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Run tests with race detector
      run: go test -race -v ./...